name: Atualizar placar
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm i @vercel/blob@2.5.0 --no-save --no-audit --no-fund
      - name: Contar (com deduplicação)
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          node update-counts.mjs
          cp placar-data.json /tmp/placar-data.json
      - name: Publicar na branch data
        run: |
          git config user.name "placar-bot"; git config user.email "bot@vaitecnologia.com.br"
          git fetch origin data
          git checkout -f data
          cp /tmp/placar-data.json placar-data.json
          git add placar-data.json
          git diff --staged --quiet || (git commit -m "placar: contagem deduplicada [skip ci]" && git push origin HEAD:data)
