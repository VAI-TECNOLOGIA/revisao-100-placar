<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0B0A08">
<title>Revisão 100 · Placar ao vivo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --preto:#0B0A08; --preto2:#100D0A; --linha:#2A2218;
  --brasa:#F2621A; --brasa-hi:#FF8A47; --ambar:#F2A024; --ouro:#FFC24D;
  --cal:#F7F1E6; --pedra:#C6B7A2; --fumaca:#7A6C5A;
  --disp:'Archivo Black',Impact,sans-serif; --txt:'Inter',system-ui,sans-serif; --mono:'Space Grotesk',ui-monospace,monospace;
  --fogo:linear-gradient(150deg,#FFC24D 0%,#F2A024 30%,#F2621A 68%,#B02310 100%);
  --fogoh:linear-gradient(100deg,#FFC24D,#FF8A47 45%,#F2621A 100%);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--preto);color:var(--cal);font-family:var(--txt);-webkit-font-smoothing:antialiased}
.bg{position:fixed;inset:0;z-index:0;background:
  radial-gradient(60% 55% at 84% 12%,rgba(242,98,26,.20),transparent 60%),
  radial-gradient(55% 50% at 8% 104%,rgba(255,194,77,.12),transparent 60%),
  linear-gradient(180deg,#100D0A,#0B0A08)}
#spark{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.75}

.stage{position:relative;z-index:3;height:100dvh;display:flex;flex-direction:column;padding:min(4vh,42px) min(5vw,72px)}
/* topo */
.top{display:flex;align-items:center;justify-content:space-between;flex:0 0 auto}
.logo{display:inline-flex;align-items:flex-end;gap:.34em}
.logo svg{height:clamp(30px,4.4vh,52px)}
.logo .wm{display:flex;flex-direction:column;line-height:.7;transform:skewX(-9deg)}
.logo .wm .r{font-family:var(--disp);font-size:.32em;letter-spacing:.05em;color:var(--cal)}
.logo .wm .c{font-family:var(--disp);font-size:1em;letter-spacing:-.04em;background:var(--fogo);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:var(--brasa)}
.logo .wm .c b{font-size:clamp(26px,4.2vh,50px);font-weight:400}
.live{display:inline-flex;align-items:center;gap:9px;font-family:var(--mono);font-size:clamp(11px,1.5vh,14px);letter-spacing:.24em;text-transform:uppercase;color:var(--pedra)}
.live .dot{width:9px;height:9px;border-radius:50%;background:#37C26B;box-shadow:0 0 10px #37C26B;animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.7)}}

/* corpo: FALTAM + número | grade de marcas */
.body{flex:1;display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.05fr);align-items:center;gap:min(4vw,54px)}
.left{min-width:0}
.kick{font-family:var(--mono);font-size:clamp(15px,2.5vh,26px);letter-spacing:.42em;text-transform:uppercase;color:var(--pedra);margin-bottom:.1em;margin-left:.1em}
.num{font-family:var(--disp);font-size:clamp(120px,34vh,360px);line-height:.82;letter-spacing:-.04em;background:var(--fogo);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:var(--ouro);filter:drop-shadow(0 .04em .12em rgba(242,98,26,.35));font-variant-numeric:tabular-nums}
.sub{font-family:var(--mono);font-size:clamp(13px,2vh,21px);letter-spacing:.16em;text-transform:uppercase;color:var(--pedra);margin-top:.6em;max-width:20ch;line-height:1.5}
.sub b{color:var(--ouro);font-weight:500}
/* placar completo (cheio) */
.cheio .num{font-size:clamp(80px,22vh,220px)}

/* grade de tally (20 símbolos = 100) */
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:min(2.2vw,26px) min(2.4vw,30px);align-content:center;justify-items:center}
.tally{width:100%;max-width:130px}
.tally .st{transition:opacity .5s ease, stroke .5s ease}
.tally .st.off{opacity:.14}
.tally .st.on{opacity:1;filter:drop-shadow(0 0 5px rgba(242,98,26,.7))}

/* rodapé: obreiros pequeno + tagline */
.foot{flex:0 0 auto;display:flex;align-items:flex-end;justify-content:space-between;gap:20px;padding-top:min(2vh,18px)}
.obr{font-family:var(--mono);letter-spacing:.14em;text-transform:uppercase}
.obr .lb{font-size:clamp(11px,1.5vh,14px);color:var(--fumaca)}
.obr .vl{font-size:clamp(20px,3.4vh,34px);font-family:var(--disp);color:var(--cal);font-variant-numeric:tabular-nums;letter-spacing:0;margin-top:.2em}
.obr .vl b{background:var(--fogoh);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:var(--ouro)}
.tagline{font-family:var(--disp);text-transform:uppercase;font-size:clamp(18px,3.6vh,42px);letter-spacing:-.01em;transform:skewX(-6deg);text-align:right;line-height:1}
.tagline .f{background:var(--fogo);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:var(--ouro)}

@media (max-width:820px){
  .stage{padding:22px 20px}
  .body{grid-template-columns:1fr;gap:14px;align-content:center}
  .grid{order:2;grid-template-columns:repeat(5,1fr);gap:10px 14px;max-width:440px;margin:0 auto}
  .tally{max-width:74px}
  .num{font-size:clamp(96px,26vh,180px)}
  .foot{flex-direction:column;align-items:center;text-align:center;gap:12px}
  .tagline{text-align:center;font-size:clamp(18px,4.5vw,26px)}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="bg"></div>
<canvas id="spark"></canvas>

<div class="stage">
  <div class="top">
    <span class="logo">
      <svg viewBox="0 0 66 74" aria-hidden="true"><g fill="none" stroke-linecap="round"><line x1="12" y1="9" x2="9" y2="65" stroke="#F7F1E6" stroke-width="6"/><line x1="26" y1="8" x2="23" y2="66" stroke="#F7F1E6" stroke-width="5.4"/><line x1="40" y1="9" x2="37" y2="65" stroke="#F7F1E6" stroke-width="6"/><line x1="54" y1="8" x2="51" y2="66" stroke="#F7F1E6" stroke-width="5.4"/><line x1="3" y1="69" x2="63" y2="7" stroke="url(#lf)" stroke-width="7"/></g><defs><linearGradient id="lf" x1="0" y1="1" x2=".4" y2="0"><stop offset="0" stop-color="#B02310"/><stop offset=".5" stop-color="#F2621A"/><stop offset="1" stop-color="#FFC24D"/></linearGradient></defs></svg>
      <span class="wm"><span class="r">Revisão</span><span class="c"><b>100</b></span></span>
    </span>
    <span class="live"><span class="dot"></span> ao vivo</span>
  </div>

  <div class="body" id="body">
    <div class="left">
      <div class="kick" id="kick">Faltam</div>
      <div class="num" id="num">—</div>
      <div class="sub" id="sub">carregando o placar…</div>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="foot">
    <div class="obr"><div class="lb">Equipe de obreiros</div><div class="vl" id="obr"><b>0</b> / 100</div></div>
    <div class="tagline">Cem é quando<br><span class="f">ninguém falta.</span></div>
  </div>
</div>

<script>
// símbolo de contagem: 5 traços (4 verticais + diagonal). 20 símbolos = 100.
function tallySVG(idx){
  const strokes=[
    'M13 8 L11 66','M26 8 L24 66','M39 8 L37 66','M52 8 L50 66', // verticais
    'M6 70 L60 6' // diagonal
  ];
  const lines=strokes.map((d,k)=>'<path class="st off" data-s="'+(idx*5+k)+'" d="'+d+'" stroke="url(#tg)" stroke-width="6.5" stroke-linecap="round" fill="none"/>').join('');
  return '<svg class="tally" viewBox="0 0 66 74">'+lines+'</svg>';
}
(function(){
  const grid=document.getElementById('grid');
  let html='<svg width="0" height="0" style="position:absolute"><defs><linearGradient id="tg" x1="0" y1="1" x2=".3" y2="0"><stop offset="0" stop-color="#F2621A"/><stop offset="1" stop-color="#FFC24D"/></linearGradient></defs></svg>';
  for(let i=0;i<20;i++) html+=tallySVG(i);
  grid.innerHTML=html;
})();

const num=document.getElementById('num'), kick=document.getElementById('kick'), sub=document.getElementById('sub'), obrEl=document.getElementById('obr'), bodyEl=document.getElementById('body');
const strokes=[].slice.call(document.querySelectorAll('.st'));
let shownLit=-1;

function lightStrokes(n){
  strokes.forEach((s,i)=>{
    const on=i<n; if(s.classList.contains('on')===on) return;
    setTimeout(()=>{ s.classList.toggle('on',on); s.classList.toggle('off',!on); }, on? i*22 : 0);
  });
}
function animateNumber(el,to){
  const from=parseInt(el.textContent)||0; if(from===to){el.textContent=to;return;}
  const steps=Math.min(Math.abs(to-from),24); let i=0;
  const t=setInterval(()=>{ i++; el.textContent=Math.round(from+(to-from)*(i/steps)); if(i>=steps){el.textContent=to;clearInterval(t);} }, 28);
}

function apply(rev, obr){
  rev=Math.max(0,Math.min(100,rev|0)); obr=Math.max(0,obr|0);
  const faltam=100-rev;
  if(rev>=100){
    bodyEl.classList.add('cheio'); kick.textContent='Completo';
    animateNumber(num,100); sub.innerHTML='<b>Ninguém faltou.</b> O Revisão 100 está completo.';
  }else{
    bodyEl.classList.remove('cheio'); kick.textContent='Faltam';
    animateNumber(num,faltam);
    sub.innerHTML='<b>'+rev+'</b> já foram contados · a conta não fecha sem eles';
  }
  obrEl.innerHTML='<b>'+obr+'</b> / 100';
  // grade DECRESCENTE: acesas = quantas faltam; some uma a cada inscrição. No fim, enche em festa.
  const lit = rev>=100 ? 100 : faltam;
  if(lit!==shownLit){ lightStrokes(lit); shownLit=lit; }
}

async function tick(){
  try{
    const r=await fetch('placar-data.json?t='+Date.now(),{cache:'no-store'});
    const j=await r.json();
    apply(j.revisionistas||0, j.obreiros||0);
  }catch(e){ /* mantém último estado */ }
}

// modo demo p/ preview: ?demo=REV,OBR
const dm=new URLSearchParams(location.search).get('demo');
if(dm){ const [r,o]=dm.split(',').map(x=>parseInt(x)||0); setTimeout(()=>apply(r,o||0),300); }
else { tick(); setInterval(tick, 8000); }

// faíscas
(function(){
  const cv=document.getElementById('spark'); if(!cv||matchMedia('(prefers-reduced-motion:reduce)').matches) return;
  const ctx=cv.getContext('2d'); let ps=[];
  function rs(){const d=devicePixelRatio||1;cv.width=innerWidth*d;cv.height=innerHeight*d;ctx.setTransform(d,0,0,d,0,0);} addEventListener('resize',rs); rs();
  const cols=['#FFC24D','#FF8A47','#F2621A'];
  for(let k=0;k<20;k++)ps.push({x:Math.random()*innerWidth,y:innerHeight+Math.random()*innerHeight,s:.5+Math.random()*1.4,v:.15+Math.random()*.5,a:.15+Math.random()*.4,c:cols[k%3]});
  (function loop(){ctx.clearRect(0,0,innerWidth,innerHeight);for(const p of ps){p.y-=p.v;p.x+=Math.sin(p.y*.02)*.2;if(p.y<-10){p.y=innerHeight+10;p.x=Math.random()*innerWidth;}ctx.globalAlpha=p.a;ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.s,0,7);ctx.fill();}ctx.globalAlpha=1;requestAnimationFrame(loop);})();
})();
</script>
</body>
</html>
